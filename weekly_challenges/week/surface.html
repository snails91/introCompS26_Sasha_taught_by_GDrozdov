<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>surface</title>

    <style>
        body{
            background-image:linear-gradient(rgb(87, 86, 86), rgb(24, 24, 24)) ;
        }
        .wood{
            position:absolute;
            left: 27%;
            background:linear-gradient(.3turn,rgb(88, 52, 18),rgb(120, 72, 27));
            width: 360px;
            height:620px;
            box-shadow: 12px 12px;
        }

        .case{
            display:flex;
            border-style: groove double;
            border-width: 4px;
            border-color:rgb(237, 166, 99);
            width: 120px;
            height:120px;
            margin:7px;
            margin-top: 7px;

        }
        .engrave1{
            border-style:  dotted;
            border-width: 2px;
            border-color:rgb(237, 166, 99);
            border-radius: 50px 0 100px 0 ;
            width: 80px;
            height:20px;
            margin:7px;
            margin-top: 7px;
        }
      .engrave2{
            border-style:dashed;
            border-width: 4px;
            border-color:rgb(237, 166, 99);
            filter:blur(8px);
            width: 170px;
            height:10px;
            margin-top: 7px;
        }
    </style>
</head>
<body>
    <div class="wood">
        <div class="case">
            <div class="engrave1">
            </div>
               <div class="engrave1">
            </div>

        </div>
        <div class="case">
        </div>
           <div class="engrave1">
            </div>
        <div class="engrave2"></div>

    </div>

</body>
</html>
